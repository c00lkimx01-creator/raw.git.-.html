<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7; /* オリジナルの背景色に近い設定 */
            font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #444444;
        }
        .container {
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .icon-wrapper {
            margin-bottom: 20px;
        }
        .icon {
            width: 64px;
            height: 64px;
            fill: #333333;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 16px 0;
            color: #333333;
            font-weight: 500;
        }
        p {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.4;
            color: #555555;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-wrapper">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            <circle cx="12" cy="12" r="2.5"/>
        </svg>
    </div>

    <h1>ページがブロックされています</h1>
    <p>このWebサイトへのアクセスは制限されています。</p>
    <p>許可されたWebサイトにのみアクセスしてください。</p>
    <p>ブロックされたカテゴリ: カテゴリなし</p>
</div>

</body>
</html>
